<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Study ToDo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- LOGIN -->
<section id="login-screen" class="screen active">
    <form id="login-form" class="form-container">
        <h1 class="form-title">Estude!</h1>

        <input 
            type="text" 
            placeholder="Usuário" 
            id="user" 
            class="form-input"
            required
        />

        <input 
            type="password" 
            placeholder="Senha" 
            id="password" 
            class="form-input"
            required
        />

        <button 
            type="submit" 
            class="form-button"
        >
            Entrar
        </button>

        <p class="form-text">
            Não possui cadastro?
            <a href="#" onclick="goTo('register-screen')" class="form-link">
                Registrar
            </a>
        </p>
    </form>
</section>

<!-- REGISTRO -->
<section id="register-screen" class="screen">
    <form id="register-form" class="form-container">
        <h1 class="form-title">Criar Conta</h1>

        <input 
            type="text" 
            placeholder="Usuário" 
            id="register-user" 
            class="form-input"
            required
        />

        <input 
            type="email" 
            placeholder="Email" 
            id="register-email" 
            class="form-input"
            required
        />

        <input 
            type="password" 
            placeholder="Senha" 
            id="register-password" 
            class="form-input"
            required
        />

        <button 
            type="submit" 
            class="form-button"
        >
            Registrar
        </button>

        <p class="form-text">
            Já possui conta?
            <a href="#" onclick="goTo('login-screen')" class="form-link">
                Entrar
            </a>
        </p>
    </form>
</section>
    
<!-- HOME -->
<div id="home" class="screen">
  <header>
    <h2 id="welcome"></h2>
    <p>24 Abril</p>
  </header>

  <div class="card foco" id="foco">
    <h3>Foco do dia</h3>
    <button onclick="goTo('focus')" id="startTimer">Começar</button>
  </div>

  <div id="taskList"></div>

  <button class="fab" onclick="goTo('create')">+</button>
</div>

<!-- CRIAR TAREFA -->
<div id="create" class="screen">
  <h2><strong>Nova Tarefa</strong></h2>
  <input id="taskTitle" placeholder="Título" />
  <button onclick="addTask()">Salvar</button>
  <button onclick="goTo('home')">Voltar</button>
</div>  

<!-- MODO FOCO -->
<div id="focus" class="screen">
  <h2 id="focusTask">Estudar</h2>
  <div id="timer">25:00</div>
  <button onclick="startTimer()" id="principal">Iniciar</button>
  <button onclick="goTo('home')">Sair</button>
</div>

<script src="script.js"></script>
</body>
</html>
